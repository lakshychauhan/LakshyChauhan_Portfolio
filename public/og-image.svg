<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="50%" stop-color="#241e18"/>
      <stop offset="100%" stop-color="#12100e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#c4956a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Border frame -->
  <rect x="40" y="30" width="1120" height="570" fill="none" stroke="#c4956a" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="50" y="40" width="1100" height="550" fill="none" stroke="#c4956a" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Corner accents -->
  <path d="M40,70 L40,30 L80,30" fill="none" stroke="#c4956a" stroke-opacity="0.6" stroke-width="2"/>
  <path d="M1120,30 L1160,30 L1160,70" fill="none" stroke="#c4956a" stroke-opacity="0.6" stroke-width="2"/>
  <path d="M40,560 L40,600 L80,600" fill="none" stroke="#c4956a" stroke-opacity="0.6" stroke-width="2"/>
  <path d="M1120,600 L1160,600 L1160,560" fill="none" stroke="#c4956a" stroke-opacity="0.6" stroke-width="2"/>
  <!-- Kicker -->
  <text x="600" y="220" text-anchor="middle" font-family="serif" font-size="16" letter-spacing="12" fill="#c4956a" opacity="0.8">✦ THE CHRONICLE OF ✦</text>
  <!-- Name -->
  <text x="600" y="310" text-anchor="middle" font-family="'Cinzel', 'Trajan Pro', serif" font-size="72" font-weight="900" fill="#e8dcc8" letter-spacing="8">LAKSHY</text>
  <text x="600" y="390" text-anchor="middle" font-family="'Cinzel', 'Trajan Pro', serif" font-size="72" font-weight="900" fill="#e8dcc8" letter-spacing="8">CHAUHAN</text>
  <!-- Divider -->
  <rect x="440" y="420" width="320" height="1" fill="url(#line)"/>
  <!-- Subtitle -->
  <text x="600" y="470" text-anchor="middle" font-family="'EB Garamond', 'Garamond', serif" font-size="22" font-style="italic" fill="#a0937e" letter-spacing="3">Maester of the Web</text>
  <!-- Gems -->
  <rect x="520" y="505" width="8" height="8" transform="rotate(45,524,509)" fill="#c4622a" opacity="0.8"/>
  <text x="555" y="515" font-family="serif" font-size="13" letter-spacing="6" fill="#a0937e" opacity="0.7">REACT · NODE · TYPESCRIPT</text>
  <rect x="823" y="505" width="8" height="8" transform="rotate(45,827,509)" fill="#6aa8c4" opacity="0.8"/>
</svg>
